<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="16" fill="#1a2245"/>
  <!-- Gold border -->
  <rect x="3.5" y="3.5" width="93" height="93" rx="12.5" fill="none" stroke="#c89830" stroke-width="2.5"/>
  <!-- Chevron mark (matches SMS Logo) -->
  <polyline points="27,31 50,48 73,31" fill="none" stroke="#e8b840" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- SMS -->
  <text x="50" y="67" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-weight="700" font-size="27" fill="#e8b840" letter-spacing="3">SMS</text>
  <!-- CUSAT -->
  <text x="50" y="81.5" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-weight="700" font-size="13.5" fill="#e8b840" letter-spacing="4.5">CUSAT</text>
  <!-- Since 1964 -->
  <text x="50" y="93" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="8.5" fill="#e8b840" opacity="0.65" letter-spacing="2">SINCE 1964</text>
</svg>
